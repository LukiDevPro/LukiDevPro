<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <defs>
    <linearGradient id="subtitle-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF">
        <animate attributeName="stop-color" values="#00D2FF;#3A7BD5;#00D2FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#3A7BD5">
        <animate attributeName="stop-color" values="#3A7BD5;#00D2FF;#3A7BD5" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00D2FF">
        <animate attributeName="stop-color" values="#00D2FF;#3A7BD5;#00D2FF" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="120" fill="#0D1117"/>
  <text x="300" y="70" font-family="Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    <tspan fill="#c3200ff">L</tspan><tspan fill="#c6500ff">u</tspan><tspan fill="#c9800ff">k</tspan><tspan fill="#ccb00ff">i</tspan><tspan fill="#cff00ff">D</tspan><tspan fill="#cff00cc">e</tspan><tspan fill="#cff0099">v</tspan><tspan fill="#cff0066">P</tspan><tspan fill="#cff0033">r</tspan><tspan fill="#cff0001">o</tspan>
  </text>
  <text x="300" y="100" font-family="Arial, sans-serif" font-size="18" fill="url(#subtitle-gradient)" text-anchor="middle">
    ✨ Coding • Creating • Innovating ✨
  </text>
</svg>
