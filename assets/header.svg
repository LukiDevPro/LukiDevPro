<svg xmlns="http://www.w3.org/2000/svg" width="800" height="150" viewBox="0 0 800 150">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0080">
        <animate attributeName="stop-color" values="#FF0080;#7928CA;#FF0080" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0070F3">
        <animate attributeName="stop-color" values="#0070F3;#00D2FF;#0070F3" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="800" height="150" fill="url(#bg-gradient)"/>
  
  <rect x="50" y="72" width="700" height="2" fill="url(#line-gradient)" rx="1">
    <animate attributeName="x" values="-100;800;-100" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <text x="400" y="65" font-family="'Segoe UI', Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    <tspan fill="#c3200ff">L</tspan><tspan fill="#c6500ff">u</tspan><tspan fill="#c9800ff">k</tspan><tspan fill="#ccb00ff">i</tspan><tspan fill="#cff00ff">D</tspan><tspan fill="#cff00cc">e</tspan><tspan fill="#cff0099">v</tspan><tspan fill="#cff0066">P</tspan><tspan fill="#cff0033">r</tspan><tspan fill="#cff0001">o</tspan>
  </text>
  
  <text x="400" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8B949E" text-anchor="middle">
    ✨ Coding • Creating • Innovating ✨
  </text>
  
  <circle cx="20" cy="20" r="3" fill="#FF0080" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="130" r="3" fill="#0070F3" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="40" cy="130" r="2" fill="#7928CA" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="20" r="2" fill="#00D2FF" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
